<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glink.ai — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #05060f;
      --surface:  #0d0f1e;
      --surface2: #131627;
      --border:   rgba(255,255,255,0.07);
      --accent:   #6c63ff;
      --accent2:  #00d4ff;
      --green:    #22c55e;
      --red:      #ef4444;
      --text:     #f0f0f8;
      --muted:    #8b8fa8;
      --gradient: linear-gradient(135deg, #6c63ff 0%, #00d4ff 100%);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ─────────────────────────────────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(108,99,255,0.12), transparent),
        radial-gradient(ellipse 50% 40% at 80% 70%, rgba(0,212,255,0.08), transparent),
        var(--bg);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 36px;
      letter-spacing: 0.3px;
    }

    .login-card label {
      display: block;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .login-card input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 20px;
    }

    .login-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--gradient);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 0 24px rgba(108,99,255,0.3);
    }

    .login-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    .login-error {
      margin-top: 14px;
      font-size: 0.82rem;
      color: var(--red);
      min-height: 18px;
    }

    /* ── ADMIN SHELL ────────────────────────────────────────────── */
    #admin-screen { display: none; min-height: 100vh; }

    /* Topbar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-right { display: flex; align-items: center; gap: 20px; }

    .topbar-badge {
      font-size: 0.75rem;
      background: rgba(108,99,255,0.12);
      border: 1px solid rgba(108,99,255,0.25);
      color: #a89fff;
      padding: 4px 12px;
      border-radius: 50px;
      font-weight: 600;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }

    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* Main content */
    .admin-main { padding: 32px; max-width: 1400px; margin: 0 auto; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Table section */
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .table-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .table-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(108,99,255,0.08);
    }

    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: rgba(139,143,168,0.5); }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: var(--surface2); }

    th {
      padding: 14px 16px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      text-align: left;
      white-space: nowrap;
    }

    td {
      padding: 14px 16px;
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:hover td { background: rgba(108,99,255,0.03); }

    .td-name { font-weight: 600; }

    .td-phone a, .td-email a {
      color: var(--accent2);
      text-decoration: none;
    }

    .td-phone a:hover, .td-email a:hover { text-decoration: underline; }

    .td-muted { color: var(--muted); font-size: 0.82rem; }

    .td-date { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

    /* Contacted toggle */
    .contact-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-track {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      position: relative;
      transition: background 0.25s, border-color 0.25s;
      flex-shrink: 0;
    }

    .toggle-track.on {
      background: rgba(34,197,94,0.25);
      border-color: rgba(34,197,94,0.4);
    }

    .toggle-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--muted);
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.25s, background 0.25s;
    }

    .toggle-track.on .toggle-thumb {
      transform: translateX(18px);
      background: var(--green);
    }

    .toggle-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.2s;
    }

    .toggle-label.on { color: var(--green); }

    /* Delete button */
    .delete-btn {
      background: transparent;
      border: 1px solid transparent;
      color: rgba(239,68,68,0.4);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: var(--red);
      border-color: rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.05);
    }

    /* Message cell */
    .td-message {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: help;
    }

    /* Empty state */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-text { font-size: 0.9rem; }

    /* Loading */
    .loading {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
    }

    /* Refresh button */
    .refresh-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Responsive */
    @media (max-width: 900px) {
      .admin-main { padding: 16px; }
      .topbar { padding: 0 16px; }
      th:nth-child(5), td:nth-child(5),
      th:nth-child(7), td:nth-child(7) { display: none; }
    }

    @media (max-width: 600px) {
      th:nth-child(4), td:nth-child(4),
      th:nth-child(6), td:nth-child(6) { display: none; }
      .search-input { width: 140px; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Glink.ai</div>
    <div class="login-subtitle">Admin Panel — Enter password to continue</div>

    <label for="pwd-input">Password</label>
    <input type="password" id="pwd-input" placeholder="••••••••" autocomplete="current-password" />

    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── ADMIN ───────────────────────────────────────────────────────────────── -->
<div id="admin-screen">
  <div class="topbar">
    <div class="topbar-logo">Glink.ai</div>
    <div class="topbar-right">
      <span class="topbar-badge">Admin Panel</span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="admin-main">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Leads</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Contacted</div>
        <div class="stat-value" id="stat-contacted">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-value" id="stat-today">—</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-header">
      <div class="table-title">All Contacts</div>
      <div class="table-controls">
        <input class="search-input" type="text" id="search-input" placeholder="Search name, phone, city…" oninput="renderTable()" />
        <button class="filter-btn active" id="filter-all" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" id="filter-pending" onclick="setFilter('pending', this)">Pending</button>
        <button class="filter-btn" id="filter-contacted" onclick="setFilter('contacted', this)">Contacted</button>
        <button class="refresh-btn" onclick="loadContacts()">↻ Refresh</button>
      </div>
    </div>

    <div class="table-wrap">
      <div class="loading" id="table-loading">Loading contacts…</div>
      <table id="contacts-table" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Profession</th>
            <th>City</th>
            <th>Service</th>
            <th>Message</th>
            <th>Submitted</th>
            <th>Contacted</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="contacts-tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No contacts match your filter.</div>
      </div>
    </div>
  </div>
</div>

<script>
  let allContacts = [];
  let activeFilter = 'all';

  // ── Auth ─────────────────────────────────────────────────────────────────
  async function checkSession() {
    const res = await fetch('/api/admin/session', { credentials: 'include' });
    const data = await res.json();
    if (data.isAdmin) showAdmin();
  }

  async function doLogin() {
    const pwd = document.getElementById('pwd-input').value;
    const err = document.getElementById('login-error');
    err.textContent = '';
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
        credentials: 'include',
      });
      if (res.ok) {
        showAdmin();
      } else {
        err.textContent = 'Incorrect password. Try again.';
        document.getElementById('pwd-input').value = '';
      }
    } catch {
      err.textContent = 'Server unreachable. Is the backend running?';
    }
  }

  async function doLogout() {
    await fetch('/api/admin/logout', { method: 'POST', credentials: 'include' });
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pwd-input').value = '';
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadContacts();
  }

  // ── Data ─────────────────────────────────────────────────────────────────
  async function loadContacts() {
    document.getElementById('table-loading').style.display = 'block';
    document.getElementById('contacts-table').style.display = 'none';
    document.getElementById('empty-state').style.display = 'none';
    try {
      const res = await fetch('/api/admin/contacts', { credentials: 'include' });
      if (!res.ok) { doLogout(); return; }
      allContacts = await res.json();
      updateStats();
      renderTable();
    } catch {
      document.getElementById('table-loading').textContent = 'Failed to load. Check server.';
    }
  }

  function updateStats() {
    const total = allContacts.length;
    const contacted = allContacts.filter(c => c.contacted).length;
    const today = allContacts.filter(c => {
      const d = new Date(c.created_at);
      const now = new Date();
      return d.toDateString() === now.toDateString();
    }).length;
    document.getElementById('stat-total').textContent     = total;
    document.getElementById('stat-contacted').textContent = contacted;
    document.getElementById('stat-pending').textContent   = total - contacted;
    document.getElementById('stat-today').textContent     = today;
  }

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const query = document.getElementById('search-input').value.toLowerCase();
    let rows = allContacts;

    if (activeFilter === 'pending')   rows = rows.filter(c => !c.contacted);
    if (activeFilter === 'contacted') rows = rows.filter(c => c.contacted);

    if (query) {
      rows = rows.filter(c =>
        (c.name       || '').toLowerCase().includes(query) ||
        (c.phone      || '').toLowerCase().includes(query) ||
        (c.city       || '').toLowerCase().includes(query) ||
        (c.email      || '').toLowerCase().includes(query) ||
        (c.profession || '').toLowerCase().includes(query)
      );
    }

    document.getElementById('table-loading').style.display = 'none';

    if (rows.length === 0) {
      document.getElementById('contacts-table').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('contacts-table').style.display = 'table';

    const tbody = document.getElementById('contacts-tbody');
    tbody.innerHTML = rows.map((c, i) => `
      <tr id="row-${c.id}">
        <td class="td-muted">${i + 1}</td>
        <td class="td-name">${esc(c.name)}</td>
        <td class="td-phone">
          <a href="tel:${esc(c.phone)}">${esc(c.phone)}</a>
        </td>
        <td>${c.email ? `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>` : '<span class="td-muted">—</span>'}</td>
        <td class="td-muted">${esc(c.profession || '—')}</td>
        <td class="td-muted">${esc(c.city || '—')}</td>
        <td class="td-muted">${esc(c.service || '—')}</td>
        <td>
          <span class="td-message" title="${esc(c.message || '')}">${esc(c.message || '—')}</span>
        </td>
        <td class="td-date">${formatDate(c.created_at)}</td>
        <td>
          <label class="contact-toggle" onclick="toggleContacted(${c.id}, event)">
            <div class="toggle-track ${c.contacted ? 'on' : ''}" id="track-${c.id}">
              <div class="toggle-thumb"></div>
            </div>
            <span class="toggle-label ${c.contacted ? 'on' : ''}" id="label-${c.id}">
              ${c.contacted ? 'Done' : 'Pending'}
            </span>
          </label>
        </td>
        <td>
          <button class="delete-btn" onclick="deleteContact(${c.id})" title="Delete">✕</button>
        </td>
      </tr>
    `).join('');
  }

  // ── Actions ───────────────────────────────────────────────────────────────
  async function toggleContacted(id, e) {
    e.preventDefault();
    const res = await fetch(`/api/admin/contacts/${id}/contacted`, {
      method: 'PATCH',
      credentials: 'include',
    });
    if (!res.ok) return;
    const updated = await res.json();

    // Update in local array
    const idx = allContacts.findIndex(c => c.id === id);
    if (idx !== -1) allContacts[idx] = updated;

    // Update stats
    updateStats();

    // Update row visually without full re-render
    const track = document.getElementById(`track-${id}`);
    const label = document.getElementById(`label-${id}`);
    if (track && label) {
      track.classList.toggle('on', updated.contacted);
      label.classList.toggle('on', updated.contacted);
      label.textContent = updated.contacted ? 'Done' : 'Pending';
    }

    // If filter active, remove row if it no longer matches
    if (activeFilter !== 'all') renderTable();
  }

  async function deleteContact(id) {
    if (!confirm('Delete this contact? This cannot be undone.')) return;
    const res = await fetch(`/api/admin/contacts/${id}`, {
      method: 'DELETE',
      credentials: 'include',
    });
    if (!res.ok) return;
    allContacts = allContacts.filter(c => c.id !== id);
    updateStats();
    renderTable();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
  }

  // Enter key on login
  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Check if already logged in on page load
  checkSession();
</script>
</body>
</html>
